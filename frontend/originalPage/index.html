<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Team</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Roboto:wght@300;500&display=swap" rel="stylesheet">
</head>
<script>
    // Placeholder for future functionality
console.log("Welcome to our team page!");

</script>
<style>
    /* Global Styles */
body {
    font-family: 'Roboto', sans-serif;
    margin: 0;
    padding: 0;
    background-color: #a5d3e7;
    color: #333;
}

/* Header Styles */
header {
    /*background: linear-gradient(to right, #181f19,#09a4bf, #065fd3);*/
    background: black;
    color: rgb(8, 203, 229);
    text-align: center;
    padding: 2rem 0;
    position: relative;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
}


header::before {
    content: '';
    position: absolute;
    bottom: -20px;
    left: 0;
    width: 100%;
    height: 20px;
    background: url('images/wave.png') repeat-x;
}

.header-content h1 {
    margin: 0;
    font-size: 3rem;
    font-family: 'Montserrat', sans-serif;
    letter-spacing: 1px;
    text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
}

.header-content p {
    font-size: 1.5rem;
    font-family: 'Roboto', sans-serif;
    margin-top: 0.5rem;
    font-weight: 300;
}
.logo {
    width: 100px; /* Adjust the logo size as needed */
    height: auto;
    position: absolute;
    left: 30px;
    margin-top: 15px;
}


/* Team Section */
#team {
    padding: 3rem 2rem;
    text-align: center;
    background-color: #fff;
}

#team h2 {
    font-size: 2.5rem;
    margin-bottom: 2rem;
    font-family: 'Montserrat', sans-serif;
}

.team-container {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 2rem;
}

.team-member {
    background-color: #f4f4f4;
    padding: 1.5rem;
    margin: 1rem;
    border-radius: 15px;
    width: 250px;
    text-align: center;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
}

.team-member:hover {
    transform: translateY(-10px);
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
}

.team-member img {
    width: 100%;
    height: auto;
    border-radius: 50%;
    transition: transform 0.3s ease;
}

.team-member:hover img {
    transform: scale(1.05);
}

.team-member h3 {
    margin: 1rem 0 0.5rem;
    font-size: 1.5rem;
    font-family: 'Montserrat', sans-serif;
}

.team-member p {
    margin: 0;
    font-size: 1rem;
    color: #555;
    font-weight: 300;
}

/* Footer */
footer {
    background-color: #333;
    color: white;
    text-align: center;
    padding: 1.5rem 0;
    font-size: 0.9rem;
    position: relative;
}

footer p {
    margin: 0;
}

</style>
<body>
    <!-- Header Section -->
    <header>
        <img src="images/logo-no-background.png" alt="Team Logo" class="logo"></div>
        <div class="header-content">
            <h1>Welcome to Code Guardians</h1>
            <p>"Securing Tomorrow, One Line at a Time."</p>
        </div>
    </header>

    <!-- Team Section -->
    <section id="team">
        <h2>Meet the Team</h2>
        <div class="team-container">
            <div class="team-member">
                <img src="images/diwash.jpg" alt="John Doe">
                <h3>Diwash Bhandari</h3>
                <p>Developer Head</p>
            </div>
            <div class="team-member">
                <img src="images/nirdesh.jpg" alt="Jane Smith">
                <h3>Nirdesh Pokharel</h3>
                <p>Cloud Integration Specialist</p>
            </div>
            <div class="team-member">
                <img src="images/Aashish.jpg" alt="Alice Brown">
                <h3>Ashish Thapa</h3>
                <p>Software Architect</p>
            </div>
        </div>
    </section>

    <!-- Footer Section -->
    <footer>
        <p>© 2024 Our Team. All Rights Reserved.</p>
    </footer>
    
    <script src="script.js"></script>
</body>
</html>
